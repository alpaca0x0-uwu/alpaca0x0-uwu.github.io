});</component></div></div></div><script type=module>
    import QS from '/js/qrCodeStyling.js';
    import { createApp, onMounted, reactive, watch } from '/framework/vue.js';
    const App = createApp({setup(){
        // 
        const qrcode = reactive({
            content: '',
            color: '#000000',
            bgColor: '#ffffff',
            cornerSquareColor: '#000000',
            ecLevel: 'M',
            typeNumber: 8,
            typeNumberAuto: true,
            width: 300,
            height: 300,
            error: false,
            handler: new QS({
                width: 300,
                height: 300,
                type: "svg",
                data: window.location.href,
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: 10
                },
            }),
            update: (...args) => { qrcode.handler.update(...args); },
            download: (...args) => { qrcode.handler.download(...args); },
            copyToClipboard: async () => {
                const blob = await qrcode.handler.getRawData("png");
                try {
                    await navigator.clipboard.write([
                        new ClipboardItem({
                            [blob.type]: blob
                        })
                    ]);
                    Swal.fire({
                        position: 'bottom-end',
                        icon: 'success',
                        title: 'Copied !',
                        toast: true,
                        showConfirmButton: false,
                        timer: 2000,
                        timerProgressBar: true,
                        didOpen: (toast) => {
                            toast.addEventListener('mouseenter', Swal.stopTimer)
                            toast.addEventListener('mouseleave', Swal.resumeTimer)
                        }
                    });
                } catch (err) {
                    Swal.fire({
                        position: 'bottom-end',
                        icon: 'error',
                        title: 'Failed to copy!',
                        toast: true,
                        showConfirmButton: false,
                        timer: 2000,
                        timerProgressBar: true,
                        didOpen: (toast) => {
                            toast.addEventListener('mouseenter', Swal.stopTimer)
                            toast.addEventListener('mouseleave', Swal.resumeTimer)
                        }
                    });
                }
            },
        });
        // 
        watch(()=> [ 
            qrcode.color, 
            qrcode.bgColor,
            qrcode.cornerSquareColor, 
            qrcode.content,
            qrcode.ecLevel,
            qrcode.typeNumber,
            qrcode.typeNumberAuto,
        ], ()=>{
            try{
                qrcode.update({
                    data: qrcode.content || window.location.href,
                    qrOptions: {
                        errorCorrectionLevel: qrcode.ecLevel,
                        typeNumber: qrcode.typeNumberAuto ? 0 : qrcode.typeNumber,
                        mode: 'Byte',
                    },
                    dotsOptions: {
                        color: qrcode.color,
                        // type: "rounded",
                    },
                    backgroundOptions: {
                        color: qrcode.bgColor,
                    },
                    cornersSquareOptions: {
                        color: qrcode.cornerSquareColor,
                    },
                });
                qrcode.error = false;
            }catch(e){
                qrcode.error = true;
            }
        }, { deep: true, });
        // 
        onMounted(()=>{
            qrcode.handler.append(document.querySelector("#canvas"));
        });
        // 
        return { window, qrcode };
    }}).mount('#App');
</script></main><footer><script></script></footer></body></html>
