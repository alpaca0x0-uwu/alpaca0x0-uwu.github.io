<button id=fullscreen-close @click=fullscreen.hide>✕</button><div id=fullscreen-name>{{ fullscreen.name }}</div></div><div id=status-bar><div class=dot :class="{'loading': ui.busy}"></div><span>{{ ui.status }}</span></div><div id=loading-overlay v-show=ui.loading><div class="ts-loading is-large" style=color:#fff></div><div class="ts-text is-large" style=color:#fff>{{ ui.loadingText }}</div></div></div><script src=https://unpkg.com/leaflet@1.9.4/dist/leaflet.js></script><script src=https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js></script><script type=module>
import { createApp, reactive, onMounted } from '/framework/vue.js';
import { LocalStorage } from '/js/localStorage.min.14d49f986074eda49e648bda5e9055fa5151abe7b426598f850d14b5540ec878.js';
import Proxy from '/js/proxy.min.78d439e5f1a95f7b134c94bfc5b5d5b77eb92a9054ecee07dc270c7f1a0c2b57.js';

createApp({ setup() {
    const APIS      = [
        'https://thbapp.thb.gov.tw/services/cctv/freeway',
        'https://thbapp.thb.gov.tw/services/cctv/thb',
    ];
    const CACHE_KEY = 'taiwan-cctv-v1';
    const CACHE_TTL = 60 * 60 * 1000;

    let ui = reactive({
        loading:     true,
        loadingText: '正在初始化...',
        status:      '正在初始化...',
        busy:        false,
        setStatus:   (text, busy = false) => { ui.status = text; ui.busy = busy; },
    });

    let counts = reactive({ total: 0, active: 0 });

    // 圖片輪詢用的內部狀態（不需觸發 re-render）
    let _cctv = null, _timer = null, _pending = null;

    let panel = reactive({
        visible:    false,
        imgSrc:     '',
        imgLoading: false,
        name:       '',
        adShown:    false,
        stopRefresh: () => {
            clearTimeout(_timer);
            if (_pending) { _pending.onload = null; _pending.onerror = null; _pending.src = ''; _pending = null; }
            _cctv = null;
        },
        loadFrame: () => {
            if (!_cctv) return;
            const cctv = _cctv;
            const img  = new Image();
            _pending   = img;
            const sep  = cctv.html.includes('?') ? '&' : '?';
            img.src    = `${cctv.html}${sep}_t=${Date.now()}`;
            img.onload = () => {
                if (_pending !== img) return;
                panel.imgSrc     = img.src;
                panel.imgLoading = false;
                if (fullscreen.open) fullscreen.src = img.src;
                _pending = null;
                _timer   = setTimeout(panel.loadFrame, 3000);
            };
            img.onerror = () => {
                if (_pending !== img) return;
                _pending = null;
                if (_cctv === cctv) _timer = setTimeout(panel.loadFrame, 5000);
            };
        },
        open: (cctv) => {
            panel.stopRefresh();
            _cctv            = cctv;
            panel.imgSrc     = '';
            panel.imgLoading = true;
            panel.name       = `${cctv.stakenumber}　${cctv.id}`;
            panel.visible    = true;
            panel.adShown    = true;
            LocalStorage.set('cctv', cctv.id);
            ui.setStatus(cctv.stakenumber);
            panel.loadFrame();
        },
        close: () => {
            panel.stopRefresh();
            panel.imgSrc  = '';
            panel.visible = false;
            LocalStorage.set('cctv', '');
            ui.setStatus(`顯示 ${counts.active} 個 CCTV（共 ${counts.total} 個）`);
        },
    });

    let fullscreen = reactive({
        open: false,
        src:  '',
        name: '',
        show: () => { fullscreen.src = panel.imgSrc; fullscreen.name = panel.name; fullscreen.open = true; },
        hide: () => { fullscreen.open = false; fullscreen.src = ''; },
    });

    document.addEventListener('keydown', e => { if (e.key === 'Escape') fullscreen.hide(); });

    let search = reactive({
        keyword:  LocalStorage.get('keyword') || '',
        results:  [],
        open:     false,
        noResult: false,
        _timer:   null,
        onInput: () => {
            clearTimeout(search._timer);
            const q = search.keyword.trim();
            LocalStorage.set('keyword', q);
            if (!q) { search.open = false; return; }
            search._timer = setTimeout(() => search.fetch(q), 350);
        },
        fetch: async (q) => {
            try {
                const url    = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&countrycodes=tw&limit=6&accept-language=zh-TW`;
                const places = await fetch(url).then(r => r.json());
                search.results  = places.map(p => {
                    const parts = p.display_name.split(',');
                    return { placeId: p.place_id, lat: +p.lat, lon: +p.lon, main: parts[0].trim(), sub: parts.slice(1, 3).join(',').trim() };
                });
                search.noResult = places.length === 0;
                search.open     = true;
            } catch (_) {}
        },
        select: (place) => {
            map.setView([place.lat, place.lon], 14);
            search.keyword = place.main;
            search.open    = false;
        },
    });

    document.addEventListener('click', e => {
        const el = document.getElementById('search-container');
        if (el && !el.contains(e.target)) search.open = false;
    });

    let map;

    onMounted(async () => {
        ui.loadingText = '正在初始化地圖...';

        const savedPos   = LocalStorage.load('pos');
        const initCenter = (savedPos.lat && savedPos.lng) ? [savedPos.lat, savedPos.lng] : [23.97, 120.97];
        const initZoom   = savedPos.zoom ?? 10;

        map = L.map('map', { zoomControl: false }).setView(initCenter, initZoom);
        L.control.zoom({ position: 'topright' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, minZoom: 7,
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        }).addTo(map);

        // 定位控制
        let locateMarker = null;
        const LocateControl = L.Control.extend({
            options: { position: 'topright' },
            onAdd() {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                const btn       = L.DomUtil.create('button', 'leaflet-locate-btn', container);
                btn.title       = '定位到我的位置';
                btn.innerHTML   = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="7"/><line x1="12" y1="17" x2="12" y2="22"/><line x1="2" y1="12" x2="7" y2="12"/><line x1="17" y1="12" x2="22" y2="12"/></svg>`;
                L.DomEvent.on(btn, 'click', () => {
                    if (!navigator.geolocation) { ui.setStatus('此裝置不支援定位'); return; }
                    btn.classList.add('is-locating');
                    ui.setStatus('正在定位...', true);
                    navigator.geolocation.getCurrentPosition(
                        ({ coords }) => {
                            const { latitude: lat, longitude: lng, accuracy } = coords;
                            map.setView([lat, lng], 16);
                            if (locateMarker) locateMarker.remove();
                            locateMarker = L.circle([lat, lng], { radius: accuracy, color: '#2196f3', fillColor: '#2196f3', fillOpacity: 0.12, weight: 2 }).addTo(map);
                            L.circleMarker([lat, lng], { radius: 7, fillColor: '#2196f3', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(map);
                            btn.classList.remove('is-locating');
                            btn.classList.add('is-active');
                            ui.setStatus('已定位到您的位置');
                        },
                        err => { btn.classList.remove('is-locating'); ui.setStatus(`定位失敗：${err.message}`); },
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                });
                L.DomEvent.disableClickPropagation(container);
                return container;
            },
        });
        new LocateControl().addTo(map);

        const clusterGroup  = L.markerClusterGroup({ maxClusterRadius: 50, disableClusteringAtZoom: 15 });
        map.addLayer(clusterGroup);
        const activeMarkers = new Map();

        const camIcon = L.divIcon({
            className: 'cam-marker-wrapper',
            html:      '<div style="width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;"><div class="cam-dot"></div></div>',
            iconSize:  [24, 24], iconAnchor: [12, 12],
        });

        const updateView = (cctvs) => {
            const bounds     = map.getBounds().pad(0.15);
            const visible    = cctvs.filter(c => bounds.contains([c.gisy, c.gisx]));
            const visibleIds = new Set(visible.map(c => c.id));
            for (const [id, marker] of activeMarkers) {
                if (!visibleIds.has(id)) { clusterGroup.removeLayer(marker); activeMarkers.delete(id); }
            }
            const toAdd = [];
            for (const cctv of visible) {
                if (!activeMarkers.has(cctv.id)) {
                    const marker = L.marker([cctv.gisy, cctv.gisx], { icon: camIcon });
                    marker.bindTooltip(cctv.stakenumber, { direction: 'top', offset: [0, -6] });
                    marker.on('click', () => panel.open(cctv));
                    activeMarkers.set(cctv.id, marker);
                    toAdd.push(marker);
                }
            }
            if (toAdd.length) clusterGroup.addLayers(toAdd);
            counts.active = activeMarkers.size;
            ui.setStatus(`顯示 ${counts.active} 個 CCTV（共 ${counts.total} 個）`);
        };

        try {
            // 嘗試從 localStorage cache 取資料
            let cctvs = null;
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (raw) {
                    const { data, ts } = JSON.parse(raw);
                    if (Date.now() - ts < CACHE_TTL) cctvs = data;
                }
            } catch (_) {}

            if (!cctvs) {
                ui.loadingText = '正在獲取 CCTV 資料...';
                ui.setStatus('正在獲取 CCTV 資料...', true);
                const results = await Promise.all(
                    APIS.map(url =>
                        Proxy.fetch(url)
                            .then(r => r.json())
                            .catch(err => { console.warn('fetch failed:', url, err); return []; })
                    )
                );
                cctvs = results.flat();
                try { localStorage.setItem(CACHE_KEY, JSON.stringify({ data: cctvs, ts: Date.now() })); } catch (_) {}
            }

            counts.total = cctvs.length;
            ui.loading   = false;
            ui.setStatus(`已載入 ${counts.total} 個 CCTV`);
            updateView(cctvs);

            const savedId = LocalStorage.get('cctv');
            if (savedId) {
                const found = cctvs.find(c => c.id === savedId);
                if (found) panel.open(found);
            }

            let moveTimer;
            map.on('moveend zoomend', () => {
                const c = map.getCenter();
                LocalStorage.set('pos', JSON.stringify({ lat: c.lat, lng: c.lng, zoom: map.getZoom() }));
                clearTimeout(moveTimer);
                moveTimer = setTimeout(() => updateView(cctvs), 150);
            });

        } catch (err) {
            ui.loadingText = `載入失敗：${err.message}`;
            ui.setStatus('載入失敗');
            console.error(err);
        }
    });

    return { ui, panel, fullscreen, search };
}}).mount('#App');
